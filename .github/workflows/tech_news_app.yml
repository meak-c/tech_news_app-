name: Tech News Morning

on:
  schedule:
    - cron: "7 18 * * *"
  workflow_dispatch:

concurrency:
  group: tech-news-morning
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      page-ready: ${{ steps.page.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest

      - name: Fetch news and render site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
        run: uv run python -m tech_news_app.main

      - name: Persist SQLite database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.sqlite
          if git diff --cached --quiet; then
            echo "Database did not change."
          else
            git commit -m "chore: update tech news database"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Mark page ready
        id: page
        run: echo "ready=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    if: needs.build.outputs.page-ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
